<!DOCTYPE html>
<html lang="pt-BR">
 
<head>
    <meta charset="UTF-8">
    <title>StepStyle - Loja de Sapatos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
 
<body>
 
    <div class="container">
 
        <header class="header">
            <h1>StepStyle</h1>
            <nav class="menu">
                <a href="#">Início</a>
                <a href="#">Masculino</a>
                <a href="#">Feminino</a>
                <a href="#">Contato</a>
            </nav><!--  -->
        </header>
 
        <section class="banner">
            <h2>Nova Coleção 2026</h2>
        </section>
 
        <main class="products">
            <section class="card">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Tênis 1">
                <h3>Tênis Esportivo</h3>
                <p>R$ 199,90</p>
            </section>
 
            <section class="card">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Tênis 2">
                <h3>Tênis Casual</h3>
                <p>R$ 149,90</p>
            </section>
 
            <section class="card">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Tênis 3">
                <h3>Sapato Social</h3>
                <p>R$ 249,90</p>
            </section>
 
            <section class="card">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Tênis 4">
                <h3>Tênis Street</h3>
                <p>R$ 179,90</p>
            </section>
        </main>
 
        <footer class="footer">
            <p>© 2026 StepStyle - Todos os direitos reservados</p>
        </footer>
 
    </div>
 
</body>
 
</html>
