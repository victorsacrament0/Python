<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Formulário</title>
</head>
<body>

    <h1>:.Formulário.:</h1>
    <form action="/enviar-dados" method="POST"></form>
        
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required><br><br>
        
        
        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" placeholder="email@email.com.br"><br><br>
        
        
        <label for="senha">Senha:</label><br>
        <input type="password"><br><br>

        
        <label for="data">Data Nascimento:</label><br>
        <input type="date" value="data"><br><br>

        <h3>Qual seu estado:</h3>
        <select name="estado" id="">
            <option value="rio">-RJ-</option>
            <option value="sp">-SP-</option>
            <option value="minas">-MG-</option>
            <option value="es">-ES-</option>
        </select><br><br>  

        <h3>Seus interesses:</h3>
        <section>
            <div>
                <label for="botao">-Esportes</label>
                <input type="checkbox" id="botao"><br>
                <label for="botao">-Cinema/Filmes/Series</label>
                <input type="checkbox" id="botao"><br>
                <label for="botao">-Tecnologias</label>
                <input type="checkbox" id="botao"><br>
                <label for="botao">-Viagens</label>
                <input type="checkbox" id="botao"><br><br>
            </div>
        </section>
        
        <div>
         <input type="submit" value="Enviar">
         <input type="reset" value="Limpar">
        </div>
</body>
</html>
