<!-- 
    1. Grid básico 2x2
 
        Crie uma página com 4 blocos (div) e organize em um grid com:
    
        2 colunas
        2 linhas
        Espaçamento entre os itens
 
 
    2. Colunas com tamanhos diferentes
 
        Crie um grid com 3 colunas:
    
        A primeira: 100px
        A segunda: 200px
        A terceira: automática      
     -->

     <!DOCTYPE html>
     <html lang="pt-BR">
     <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/styless.css">
        <title>Document</title>
     </head>
     <body>
        
        <h1>Grid Basico</h1>

        <div class="container">
            <section class="item"><b>1</b></section>
            <section class="item"><b>2</b></section>
            <section class="item"><b>3</b></section>
            <section class="item"><b>4</b></section>
        </div>


        <h1>Colunas com tamanhos diferentes</h1>

        <div class="container_dois">
            <header><b>Cabecalho</b></header>
            <main><b>Corpo</b></main>
            <footer><b>Rodape</b></footer>
        </div>

     </body>
     </html>
