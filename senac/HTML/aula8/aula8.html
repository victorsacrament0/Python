<!-- 
Atividade em Grupo: Evolução de Wireframe para Home Page
🎯 Objetivo
Desenvolver a capacidade de análise crítica, colaboração em equipe e aplicação prática de HTML e CSS a partir de wireframes criados pelos próprios alunos.

👥 Formação dos Grupos
Grupos de 3 a 5 alunos
Cada integrante deverá apresentar o wireframe que criou anteriormente
📌 Etapas da Atividade
1. Escolha do Wireframe
O grupo deverá:

Analisar todos os wireframes dos integrantes
Discutir pontos fortes e fracos de cada proposta
Escolher 1 wireframe para ser trabalhado pela equipe
2. Proposta de Melhorias
Com base no wireframe escolhido, o grupo deverá:

Sugerir melhorias de layout (UX/UI)
Ajustar organização de elementos (menus, banners, seções, etc.)
Pensar em responsividade (mobile)
Justificar as decisões tomadas
💡 Exemplos:

Melhor posicionamento de menu
Ajuste de cores e contraste
Organização de conteúdo
Inclusão ou remoção de elementos
3. Desenvolvimento da Home Page
Transformar o wireframe melhorado em uma página real utilizando:

HTML
CSS
A página deve conter:

Cabeçalho (logo + menu)
Banner ou destaque principal
Seções de conteúdo
Rodapé
4. Apresentação
Cada grupo deverá apresentar:

O wireframe escolhido
As melhorias propostas
A página final desenvolvida
Explicação das decisões tomadas
📦 Entregáveis
Wireframe original escolhido
Versão com melhorias (pode ser no Moqups ou imagem)
Código da página (HTML + CSS)
Apresentação (oral ou slides)
📝 Critérios de Avaliação
Participação do grupo
Qualidade das melhorias propostas
Organização e estrutura do código
Fidelidade ao wireframe
Criatividade e usabilidade
Apresentação final
⏱️ Prazo
Próxima aula

##Todos deverão entregar de forma individual o trabalho 
-->
