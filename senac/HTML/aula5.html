<!-- *{
    margin: 0;
    border: 0;
    padding: 0; 
} -->

    <!-- Trabalhar formularios -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Cadastro</title>
</head>
<body>
    <h1>AULA 5</h1>
    
    <h2>|:.type Text.:|</h2>
    <h3>Cadastro Pessoal</h3>
    <!-- O action define para onde os dados serão enviados -->
    <form action="/enviar-dados" method="POST">
        
        <!-- Campo Nome -->
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required><br><br>
        
        <!-- Campo Sobrenome -->
        <label for="sobrenome">Sobrenome:</label><br>
        <input type="text" id="sobrenome" name="sobrenome" placeholder="Seu sobrenome" required><br><br>
        
        <!-- Campo senha  -->
        <label for="senha">Senha:</label><br>
        <input type="password" value="Senha"><br><br>
        


        <!-- Botão de Envio e Limpeza -->
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">


        <h2>|:.type RADIO.:|</h2>
        <h3>-Qual sua linguagem favorita?</h3>
        <label for="botao">HTML</label>
        <input type="radio" id="botao" name="linguagem"><br>
        <label for="botao">Python</label>
        <input type="radio" id="botao" name="linguagem"><br>
        <label for="botao">CSS</label>
        <input type="radio" id="botao" name="linguagem"><br>
        <label for="botao">Java</label>
        <input type="radio" id="botao" name="linguagem"><br><br>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
         <!-- Name serve como variavel, para ter somente uma escolha -->
                
        <h2>|:.type CheckBox.:|</h2>
        <h3>-Qual sua linguagem favorita?</h3>
        <label for="botao">HTML</label>
        <input type="checkbox" id="botao">
        <label for="botao">Python</label>
        <input type="checkbox" id="botao">
        <label for="botao">CSS</label>
        <input type="checkbox" id="botao">
        <label for="botao">Java</label>
        <input type="checkbox" id="botao"><br><br>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">

        <h2>|:.Select.:|</h2>
        <h3>-Qual sua linguagem favorita?</h3>
        <select name="linguagens" id="">
            <option value="html">-HTML-</option>
            <option value="css">-CSS-</option>
            <option value="python">-Python-</option>
        </select><br><br>  
        <input type="submit" value="Enviar">
        

    </form>

    
</body>
</html>

<!-- 
     <form action="..." method="POST">: Define o início do formulário. O atributo action especifica o arquivo que vai processar os dados, e o method="POST" envia os dados de forma segura.
     <label for="...">: Cria um rótulo para o campo. O atributo for deve ser igual ao id do input para garantir que, ao clicar no texto "Nome", o foco vá para o campo correto.
     <input type="text">: Cria o campo onde o usuário digita.
     id: Único para cada campo, usado pelo label.
     name: Fundamental. É o nome que o servidor usará para identificar o dado (ex: nome, sobrenome).
     placeholder: Uma dica exibida dentro do campo antes de o usuário digitar.
     required: Torna o campo obrigatório.
     <input type="submit">: Cria o botão que envia o formulário. -->
