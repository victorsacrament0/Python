{% extends 'base.html' %}
 
{% block content %}
<div class="form-box">
    <h2>Acessar Conta</h2>
 
    <form method="POST">
        {% csrf_token %} 
       
        <div class="form-group">
            <label>Numero da conta:</label>
            <input type="text" name="numero_form" required> 
        </div>
       
        <div class="form-group">
            <label>CPF:</label>
            <input type="text" name="cpf_form" placeholder="000.000.000-00" required>
        </div>
       
        <button type="submit" class="btn btn-primary">Acessar Conta</button>
    </form>
</div>
 
{% endblock %}
