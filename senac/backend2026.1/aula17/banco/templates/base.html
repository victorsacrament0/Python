<!Doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Banco Python{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <nav>
      <div class="container">
        <a href="/" class="logo">🏦 Banco Python</a>
        <div>
          {% if request.session.conta_numero %}
            <a href="{% url 'inicio' %}">Início</a>
            <a href="{% url 'logout' %}">Sair</a>
          {% else %}
            <a href="{% url 'inicio' %}">Início</a>
            <a href="{% url 'abrir_conta' %}">Abrir Conta</a>
            <a href="{% url 'acessar_conta' %}">Acessar conta</a>
          {% endif %}
        </div>
      </div>
    </nav>
 
    <main class="container">
      {% if messages %} 
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %} 
      {% endif %}

      {% block content %}

      {% endblock %}
    </main>
 
    <footer style="color: black;">
      <div class="container">
        <p>Projeto Banco - Django</p>
      </div>
    </footer>
  </body>
</html>
