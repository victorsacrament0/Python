<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados Clientes</title>
</head>
<body>
    <main>
        <h1><b>{{mensagem}}</b></h1>

        <hr>
                
        <table border="1">
            <thead>
                <th> Nome: </th>
                <th> Idade: </th>
                <th> Nascimento: </th>
            </thead>
        
        
        
            <tbody>
                {%  for id in clientesdb  %} 
                <tr>
                    <td> {{ id.nome }} </td>
                    <td> {{ id.idade }} </td>
                    <td> {{ id.nascimento }} </td>
                </tr>
                {% endfor  %}
            </tbody>
        </table>
    </main>
</body>
</html>
