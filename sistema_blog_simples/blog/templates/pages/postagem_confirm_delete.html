{% extends 'pages/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Excluir{% endblock %}

{% block content %}
    <div style="margin-top: 56px;" class="content-section">
        <form action="" method="post">
            {% csrf_token %}
            <fieldset class="form-group">
                <legend claass="border-bottom mb-4">Deletar Postagem</legend>
            <h4>Olá, você realmente deseja apagar essa postagem?</h4> <hr><br><h3><b>{{ object.titulo }} 🚮 </b></h3><br>
            </fieldset>
            <div class="form-group">
                <button class="btn btn-outline-info" type="submit">DELETAR</button>
            </div>
        </form>
        <div class="border-top pt-3">
            <small class="text-muted">Deseja voltar para pagina Inicial? <a href="{% url 'blog-home' %}"><b>VOLTAR</b></a></small>
        </div>
    </div>
{% endblock content %}
