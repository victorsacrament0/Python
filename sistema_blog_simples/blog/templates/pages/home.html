{% extends 'pages/base.html' %}

{% block title %}PyDjango Blog{% endblock %}


{% block content %}

    <h1>PyDjango Blog</h1>
    {% for post in posts %}
         <article class="media content-section">
            <img class="rounded-cirlce article-img" style="padding-top: 30px;" src="{{ post.autor.perfil.image.url }}" alt="">
            <div class="media-body">
              <div class="article-metadata">
                <a class="mr-2" href="#">{{ post.autor }}</a>
                <small class="text-muted">{{ post.data_postagem }}</small>
              </div>
              <h2><a class="article-title" href="{% url 'blog-detail' post.id %}">{{ post.titulo }}</a></h2>
              <p class="article-content">{{ post.conteudo }}</p>
            </div>
            <br>
          </article>
    {% endfor %}

{% endblock %}
