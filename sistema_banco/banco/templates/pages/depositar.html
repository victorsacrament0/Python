{% extends 'base.html' %}

{% block content %}
<section class="form-box">
    <h2>Depositar</h2>
    <p>Conta: </p>
    <p>Saldo Atual: R$</p>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label></label>
            <input type="number" name="valor_form" step="0.01" min="0.01" required>
        </div>
        <div class="botoes-form">
            <button type="submit" class="btn-success">Confirmar</button>
            <a class="btn btn-secondary" urlshref="">Cancelar</a>
        </div>
    </form>

</section>

{% endblock %}
