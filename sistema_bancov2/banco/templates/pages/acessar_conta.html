{% extends 'base.html' %} {% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Acessar sua conta</h2>
      <p>Insira seus dados de acesso para entrar no ambiente seguro.</p>
    </div>

    <form method="POST" class="auth-form">
      {% csrf_token %}

      <div class="form-group-modern">
        <label for="numero_conta">Número da conta</label>
        <input
          type="text"
          id="numero_conta"
          name="numero_conta"
          placeholder="Ex: 00000-0"
          required
        />
      </div>

      <div class="form-group-modern">
        <label for="cpf">CPF do titular</label>
        <input
          type="text"
          id="cpf"
          name="cpf"
          placeholder="000.000.000-00"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        Acessar minha conta
      </button>
    </form>

    <div class="auth-security-footer">
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
      </svg>
      <span>Conexão segura SSL de ponta a ponta</span>
    </div>
  </div>
</div>
{% endblock %}
