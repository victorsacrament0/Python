{% extends 'base.html' %}{% load static %}

{% block content %}
<div class="transaction-container">
    <div class="transaction-card">
        
        <div class="transaction-header">
            <div class="operation-badge badge-withdraw">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span>Saque em Conta</span>
            </div>
            <h2>Quanto deseja sacar?</h2>
        </div>

        <div class="account-summary-box">
            <div class="summary-item">
                <span class="summary-label">Conta de origem</span>
                <span class="summary-value font-mono">{{ conta.numero }}</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Saldo disponível</span>
                <span class="summary-value text-main">R$ {{ conta.saldo|floatformat:2 }}</span>
            </div>
        </div>

        <form method="POST" class="transaction-form">
            {% csrf_token %}
            
            <div class="amount-input-group">
                <label for="valor">Informe o valor do saque</label>
                <div class="currency-input-wrapper">
                    <span class="currency-prefix">R$</span>
                    <input 
                        type="number" 
                        id="valor"
                        name="valor" 
                        step="0.01" 
                        min="0.01" 
                        max="{{ conta.saldo }}"
                        placeholder="0,00"
                        required
                        autofocus
                    >
                </div>
                <span class="input-helper">O valor não pode ser maior do que o seu saldo disponível.</span>
            </div>
            
            <div class="transaction-actions">
                <button type="submit" class="btn btn-primary btn-block">Confirmar Saque</button>
                <a href="{% url 'conta' conta.id %}" class="btn btn-secondary btn-block-link">Cancelar</a>
            </div>
        </form>

    </div>
</div>
{% endblock %}
