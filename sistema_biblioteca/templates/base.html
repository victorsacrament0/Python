<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% block 'head' %}{% endblock %}
    <title>{% block 'titulo' %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" >
  </head>
  <body>
    <nav class="navbar navbar-expand-lg  navbar-dark bg-primary">
        <a class="navbar-brand ms-4" href="#"> <b>Livros</b></a>
        {% if usuario_logado %}
          <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#exampleModal" data-whatever="@mdo">Cadastrar Livro</button>
          <a href="{% url 'sair' %}">Sair</a>
          
        {% endif %}
    </nav>
   {% block 'conteudo' %}{% endblock %}

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"></script>

{% if usuario_logado %}
  <div class="modal fade show" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Cadastrar Livro</h5>    
        </div>
        <div class="modal-body">
          <form action="" method="POST">{% csrf_token %}
            <table>
             {{form.as_table}}
            </table>
            <input type="submit" class="btn btn-success" value="Cadastrar">
          </form>
        </div>
      </div>
    </div>
  </div>
{% endif %}   
  
  </body>
</html>
