{% extends 'base.html' %}

{% block 'titulo' %} Login {% endblock %}

{% block 'conteudo' %}

    <div class="container">
    <br>
    
    {% if status == '1' %}
        <div class="alert alert-danger" role="alert">
           ❌ Senha e/ou e-mail invalidos.
        </div>
    {% endif %}
    {% if status == '2' %}
        <div class="alert alert-danger" role="alert">
           ❌ Faça o login!
        </div>
    {% endif %}

    <div class="row">
        <div class="col-md-2">

        </div>
        
        <div class="col-md">
            <h1>Login</h1>
            <hr>    
            
            <form class="form-control" method="POST" action="{% url 'valida_login' %}">
                {% csrf_token %} 
                <br>
                <label for="">E-mail</label>
                <input name="email" class="form-control type="text" placeholder="email@email">
                <br>
                <label for="">Senha</label>
                <input name="senha" class="form-control" type= "password" placeholder="Senha">
                <br>
                <input class="btn btn-primary gtn-md" type="submit" value="Enviar">
                <a href="{% url 'cadastro' %}"  class="btn btn-warning gtn-md  text-white"><b>Cadastro</b></a>

            </form>
        </div>
        
        <div class="col-md-2">

        </div>

    </div>
    </div>

{% endblock %}
